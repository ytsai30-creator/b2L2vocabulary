<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit 2 英語互動站 - Anny老師</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4A90E2; --secondary: #F5A623; --success: #7ED321; --danger: #FF5E5E; --bg: #F0F4F8; --quiz-purple: #6C63FF; --dark: #333;
        }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 5px; padding: 12px 5px; position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; max-width: 90px; padding: 10px 0; border-radius: 12px; border: 2px solid var(--primary); background: transparent; color: var(--primary); font-weight: bold; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--primary); color: white; }
        .container { width: 95%; max-width: 650px; margin-top: 20px; display: none; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .container.active { display: flex; }
        
        .card { background: white; width: 100%; border-radius: 20px; padding: 25px 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        .word { font-size: 2.8rem; color: var(--primary); font-weight: bold; margin-bottom: 8px; }
        .pos { color: #888; font-style: italic; margin-bottom: 15px; }
        .def-ch { font-size: 1.2rem; color: #222; font-weight: 500; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.6; }
        .btn-main { width: 100%; min-height: 55px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; border: none; }

        /* Quiz 樣式 */
        .quiz-audio-btn { width: 85px; height: 85px; background: var(--quiz-purple); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 10px auto 25px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4); }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option-btn { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 18px 8px; font-size: 0.95rem; cursor: pointer; min-height: 75px; color: #333; transition: background 0.2s; }
        .option-btn.wrong { background: #FFEBEE !important; border-color: var(--danger) !important; color: var(--danger) !important; }
        .feedback { min-height: 50px; margin-top: 15px; font-weight: bold; font-size: 1.2rem; text-align: center; }

        /* Match 樣式 */
        #match-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
        .match-item { background: white; border-radius: 10px; border: 1px solid #E5E7EB; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; padding: 5px; cursor: pointer; text-align: center; overflow: hidden; }
        .match-item.selected { border-color: var(--quiz-purple); background: #F0EFFF; }
        .match-item.correct { visibility: hidden; }

        .report-item { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #EEE; }
        .report-label { font-weight: bold; color: #555; }
        .report-val { color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

    <nav>
        <button class="nav-btn active" onclick="showPage('learn')">Learn</button>
        <button class="nav-btn" onclick="showPage('game')">Game</button>
        <button class="nav-btn" onclick="showPage('match')">Match</button>
        <button class="nav-btn" onclick="showPage('quiz')">Quiz</button>
        <button class="nav-btn" onclick="showPage('report')">Report</button>
    </nav>

    <div id="learn" class="container active">
        <div class="card"><div id="learn-card"></div></div>
        <button class="btn-main" style="background:var(--secondary); color:white;" onclick="handleSpeak()">🔊 Listen (聽音)</button>
        <button class="btn-main" style="background:var(--primary); color:white;" onclick="handlePractice()">🎤 Practice (開口練)</button>
        <div id="learn-feedback" class="feedback"></div>
        <button class="btn-main" style="background:var(--dark); color:white;" onclick="nextLearnWord()">Next 單字 →</button>
    </div>

    <div id="game" class="container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px;">
                <span>Score: <span id="game-score-display">0</span></span>
                <span style="color:var(--danger);">Time: <span id="game-time-display">60</span>s</span>
            </div>
            <div id="game-word-display" class="word" style="padding: 20px 0;">READY?</div>
            <div id="game-feedback" class="feedback"></div>
        </div>
        <button id="game-start-btn" class="btn-main" style="background:var(--success); color:white;" onclick="startGame()">START CHALLENGE</button>
        <button id="game-retry-btn" class="btn-main" style="background:var(--primary); color:white; display:none;" onclick="startGame()">Try Again (再次挑戰)</button>
    </div>

    <div id="match" class="container">
        <div class="card">
            <h3 style="margin:0">Matching Game</h3>
            <p>時間: <span id="match-timer">0</span>s</p>
            <div id="match-grid"></div>
        </div>
        <button class="btn-main" style="background:var(--quiz-purple); color:white;" onclick="startMatchGame()">開始 / 換一組</button>
    </div>

    <div id="quiz" class="container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; color:#666; font-size: 0.9rem;">
                <span>題目: <span id="quiz-num">1</span> / 10</span>
                <span>累計得分: <span id="quiz-score-display">0</span></span>
            </div>
            <p style="margin:0; color:#888; font-size:0.85rem;">聽發音，選正確中文</p>
            <button class="quiz-audio-btn" onclick="playQuizAudio()">🔊</button>
            <div id="quiz-options" class="quiz-options"></div>
        </div>
        <div id="quiz-feedback" class="feedback"></div>
        <button id="quiz-retry-btn" class="btn-main" style="background:var(--primary); color:white; display:none;" onclick="startQuizSession()">Restart Quiz (重新測驗)</button>
    </div>

    <div id="report" class="container">
        <div class="card">
            <h2 style="margin-top:0">Progress Report</h2>
            <div class="report-item"><span class="report-label">Game 最高分</span><span class="report-val"><span id="best-game">0</span> 分</span></div>
            <div class="report-item"><span class="report-label">Match 最快時間</span><span class="report-val"><span id="best-match">--</span> 秒</span></div>
            <div class="report-item"><span class="report-label">Quiz 最高得分</span><span class="report-val"><span id="best-quiz">0</span> / 100</span></div>
        </div>
    </div>

    <script>
        const vocabulary = [
            { word: "conflict", pos: "n. [U] / vi.", def_ch: "衝突，爭執 / 衝突，抵觸", root: "conflict" },
            { word: "argument", pos: "n. [C]", def_ch: "爭吵，爭執", root: "argue" },
            { word: "argue", pos: "vi.", def_ch: "爭吵，爭論", root: "argue" },
            { word: "decision", pos: "n. [C]", def_ch: "決定，判斷", root: "decide" },
            { word: "debate", pos: "n. [C] / vt.", def_ch: "辯論，討論", root: "debate" },
            { word: "handle", pos: "vt. / n. [C]", def_ch: "應付，處理 / 把手，柄", root: "handle" },
            { word: "disagreement", pos: "n. [C]", def_ch: "意見不合", root: "disagree" },
            { word: "disagree", pos: "vi.", def_ch: "意見不合", root: "disagree" },
            { word: "sensitive", pos: "adj.", def_ch: "敏感的，需審慎處理的 / 體貼的，善解人意的", root: "sense" },
            { word: "remain", pos: "vi.", def_ch: "保持不變，依然是", root: "remain" },
            { word: "couple", pos: "n. [C]", def_ch: "夫妻，情侶 / 兩個，幾個", root: "couple" },
            { word: "attempt", pos: "vt. / n. [C]", def_ch: "試圖，嘗試", root: "attempt" },
            { word: "convince", pos: "vt.", def_ch: "說服，使相信", root: "convince" },
            { word: "defend", pos: "vt.", def_ch: "捍衛，保護", root: "defend" },
            { word: "position", pos: "n. [C]", def_ch: "立場，態度 / 姿勢，位置", root: "position" },
            { word: "spin", pos: "n. sing. / vi.", def_ch: "導向性的詮釋或描述 / 旋轉", root: "spin" },
            { word: "heal", pos: "vt.", def_ch: "使癒合，使好轉 / (使) 痊癒", root: "heal" },
            { word: "division", pos: "n. [C]", def_ch: "分歧，不合 / 分歧，隔閡", root: "divide" },
            { word: "divide", pos: "vt.", def_ch: "使分開", root: "divide" },
            { word: "describe", pos: "vt.", def_ch: "描述，描寫", root: "describe" },
            { word: "description", pos: "n. [C]", def_ch: "描述，描寫", root: "describe" },
            { word: "delay", pos: "vt. / n. [U]", def_ch: "耽擱，延誤", root: "delay" },
            { word: "judgment", pos: "n. [C]", def_ch: "評價，判斷", root: "judge" },
            { word: "judge", pos: "vt.", def_ch: "判斷，判定", root: "judge" }
        ];

        let bestScores = { game: 0, match: null, quiz: 0 };
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let mainRec = new SpeechRec(); mainRec.lang = 'en-US'; mainRec.interimResults = false;

        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { if(b.innerText.toLowerCase() === id) b.classList.add('active'); });
            
            window.speechSynthesis.cancel();
            gameActive = false;
            try { mainRec.stop(); } catch(e) {}
            
            if(id === 'report') updateReport();
            if(id === 'learn') updateLearn();
            if(id === 'quiz') startQuizSession(); 
        }

        function globalSpeak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        // --- Learn ---
        let learnIdx = 0;
        function updateLearn() {
            const d = vocabulary[learnIdx];
            document.getElementById('learn-card').innerHTML = `<div class="word">${d.word}</div><div class="pos">${d.pos}</div><div class="def-ch">${d.def_ch}</div>`;
            document.getElementById('learn-feedback').innerText = "";
        }
        function nextLearnWord() { learnIdx = (learnIdx + 1) % vocabulary.length; updateLearn(); }
        function handleSpeak() { globalSpeak(vocabulary[learnIdx].word); }
        function handlePractice() {
            const fb = document.getElementById('learn-feedback'); fb.innerText = "Listening... 🎤";
            mainRec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                if(text.includes(vocabulary[learnIdx].word.toLowerCase())) { fb.innerText = "Correct! ✨"; fb.style.color = "var(--success)"; }
                else { fb.innerText = `Try again! ❌ (heard: ${text})`; fb.style.color = "var(--danger)"; }
            };
            try { mainRec.start(); } catch(e) {}
        }

        // --- Game ---
        let gameActive = false, gameScore = 0, currentGWord = "";
        function startGame() {
            gameActive = true; gameScore = 0; let time = 60;
            document.getElementById('game-score-display').innerText = "0";
            document.getElementById('game-start-btn').style.display = 'none';
            document.getElementById('game-retry-btn').style.display = 'none';
            document.getElementById('game-feedback').innerText = "辨識中...請唸出單字！🎤";
            const timer = setInterval(() => {
                time--; document.getElementById('game-time-display').innerText = time;
                if(time <= 0 || !gameActive) { 
                    clearInterval(timer); gameActive = false; 
                    try { mainRec.stop(); } catch(e) {}
                    if(gameScore > bestScores.game) bestScores.game = gameScore;
                    document.getElementById('game-retry-btn').style.display = 'block';
                    document.getElementById('game-word-display').innerText = "FINISH!";
                }
            }, 1000);
            loadNextGameWord();
        }
        function loadNextGameWord() {
            if(!gameActive) return;
            currentGWord = vocabulary[Math.floor(Math.random()*vocabulary.length)].word;
            document.getElementById('game-word-display').innerText = currentGWord;
            mainRec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                if(text.includes(currentGWord.toLowerCase())) {
                    gameScore += 10; document.getElementById('game-score-display').innerText = gameScore;
                    document.getElementById('game-feedback').innerHTML = "<span style='color:var(--success)'>Correct! +10</span>";
                    setTimeout(loadNextGameWord, 400);
                } else {
                    document.getElementById('game-feedback').innerHTML = `<span style='color:var(--danger)'>Try again!</span>`;
                    setTimeout(() => { if(gameActive) mainRec.start(); }, 500);
                }
            };
            mainRec.onend = () => { if(gameActive) try { mainRec.start(); } catch(e) {} };
            try { mainRec.start(); } catch(e) {}
        }

        // --- Match ---
        function startMatchGame() {
            let mSecs = 0, mFound = 0;
            clearInterval(window.matchInterval);
            window.matchInterval = setInterval(() => { mSecs++; document.getElementById('match-timer').innerText = mSecs; }, 1000);
            const sub = [...vocabulary].sort(() => 0.5 - Math.random()).slice(0, 8);
            let items = [];
            sub.forEach(v => { items.push({ id: v.word, text: v.word, type: 'en' }); items.push({ id: v.word, text: `${v.def_ch}\n(${v.pos})`, type: 'ch' }); });
            items.sort(() => 0.5 - Math.random());
            const grid = document.getElementById('match-grid'); grid.innerHTML = '';
            let sel = null;
            items.forEach(i => {
                const d = document.createElement('div'); d.className = 'match-item'; d.innerText = i.text;
                d.onclick = () => {
                    if(d.classList.contains('correct') || sel?.d === d) return;
                    if(!sel) { sel = { d, i }; d.classList.add('selected'); }
                    else {
                        if(sel.i.id === i.id && sel.i.type !== i.type) {
                            d.classList.add('correct'); sel.d.classList.add('correct'); mFound++; sel = null;
                            if(mFound === 8) { clearInterval(window.matchInterval); if(!bestScores.match || mSecs < bestScores.match) bestScores.match = mSecs; }
                        } else {
                            d.classList.add('wrong'); sel.d.classList.add('wrong'); const t = sel; sel = null;
                            setTimeout(() => { d.classList.remove('wrong', 'selected'); t.d.classList.remove('wrong', 'selected'); }, 500);
                        }
                    }
                };
                grid.appendChild(d);
            });
        }

        // --- Quiz (核心修復) ---
        let quizSession = { num: 1, score: 0, used: [], curTarget: null, firstTry: true };
        function startQuizSession() {
            quizSession = { num: 1, score: 0, used: [], curTarget: null, firstTry: true };
            document.getElementById('quiz-retry-btn').style.display='none';
            loadQuiz();
        }
        function loadQuiz() {
            const container = document.getElementById('quiz-options');
            const feedback = document.getElementById('quiz-feedback');
            if (quizSession.num > 10) {
                if(quizSession.score > bestScores.quiz) bestScores.quiz = quizSession.score;
                feedback.innerText = "測驗完成！"; feedback.style.color = "var(--primary)";
                container.innerHTML = ""; document.getElementById('quiz-retry-btn').style.display='block';
                return;
            }
            document.getElementById('quiz-num').innerText = quizSession.num;
            document.getElementById('quiz-score-display').innerText = quizSession.score;
            feedback.innerText = "";
            let pool = vocabulary.filter(v => !quizSession.used.includes(v.word));
            let target = pool[Math.floor(Math.random()*pool.length)];
            quizSession.curTarget = target; quizSession.used.push(target.word); quizSession.firstTry = true;
            let opts = [target.def_ch];
            while(opts.length < 4) {
                let r = vocabulary[Math.floor(Math.random()*vocabulary.length)];
                if(!opts.includes(r.def_ch) && r.root !== target.root) opts.push(r.def_ch);
            }
            opts.sort(()=>0.5-Math.random());
            container.innerHTML = '';
            opts.forEach(opt => {
                const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = opt;
                b.onclick = () => {
                    if(opt === target.def_ch) {
                        feedback.innerText = "Correct! ✨"; feedback.style.color="var(--success)";
                        if(quizSession.firstTry) quizSession.score += 10;
                        quizSession.num++; setTimeout(loadQuiz, 1000);
                    } else {
                        quizSession.firstTry = false; b.classList.add('wrong');
                        feedback.innerText = "Try again! ❌"; feedback.style.color="var(--danger)";
                    }
                };
                container.appendChild(b);
            });
            globalSpeak(target.word);
        }
        function playQuizAudio() { if(quizSession.curTarget) globalSpeak(quizSession.curTarget.word); }

        function updateReport() {
            document.getElementById('best-game').innerText = bestScores.game;
            document.getElementById('best-match').innerText = bestScores.match || "--";
            document.getElementById('best-quiz').innerText = bestScores.quiz;
        }
        updateLearn();
    </script>
</body>
</html>
